<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>reconoSER — Pac-Man 1:1</title>
  <style>
:root{
  --primary:#c10230;
  --bg:#0b0b0f;
  --text:#f4f4f6;
  --muted:#cfcfd6;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background: radial-gradient(1200px 800px at 20% 10%, rgba(193,2,48,.18), transparent 60%),
              radial-gradient(900px 700px at 80% 20%, rgba(193,2,48,.10), transparent 55%),
              var(--bg);
  color:var(--text);
}
#wrap{max-width:980px;margin:0 auto;padding:18px}
header{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:12px}
.brand{
  font-weight:800;letter-spacing:.5px;
  font-size:28px;line-height:1;
}
.brand .ser{color:var(--primary)}
.hud{display:flex;gap:18px;flex-wrap:wrap;color:var(--muted);font-weight:600}
main{position:relative;display:flex;justify-content:center}
canvas{
  border:2px solid rgba(193,2,48,.55);
  border-radius:14px;
  background:#000;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
footer{margin-top:10px;color:var(--muted);font-size:13px;text-align:center}
.overlay{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.55);
  backdrop-filter: blur(3px);
}
.overlay.hidden{display:none}
.panel{
  width:min(520px,92%);
  background:rgba(12,12,16,.92);
  border:1px solid rgba(193,2,48,.55);
  border-radius:18px;
  padding:18px 18px 16px;
  text-align:center;
  box-shadow:0 30px 80px rgba(0,0,0,.65);
}
.panel-title{
  font-size:34px;
  font-weight:900;
  margin:0 0 8px;
}
.panel-text{color:var(--muted);font-weight:600;line-height:1.35;margin:0 0 14px}
button{
  appearance:none;border:0;cursor:pointer;
  background:var(--primary);color:white;
  font-weight:800;
  padding:10px 16px;border-radius:12px;
  font-size:16px;
}
button:hover{filter:brightness(1.05)}
  </style>
</head>
<body>
<div id="wrap">
    <header>
      <div class="brand">recono<span class="ser">SER</span></div>
      <div class="hud">
        <div>Puntos: <span id="score">0</span></div>
        <div>Vidas: <span id="lives">3</span></div>
        <div>Nivel: <span id="level">1</span></div>
      </div>
    </header>

    <main>
      <canvas id="game" width="560" height="620" aria-label="Juego reconoSER"></canvas>
      <div id="overlay" class="overlay hidden">
        <div class="panel">
          <div class="panel-title" id="overlayTitle">reconoSER</div>
          <div class="panel-text" id="overlayText"></div>
          <button id="btnStart">Jugar</button>
        </div>
      </div>
    </main>

    <footer>
      <div class="tip">Controles: ← ↑ → ↓ (o WASD). Pausa: P. Reiniciar: R.</div>
    </footer>
  </div>

(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const livesEl = document.getElementById("lives");
  const levelEl = document.getElementById("level");

  const overlay = document.getElementById("overlay");
  const overlayTitle = document.getElementById("overlayTitle");
  const overlayText = document.getElementById("overlayText");
  const btnStart = document.getElementById("btnStart");

  const PRIMARY = "#c10230";
  const CELL = 20;
  const MAZE = ["############################", "#............##............#", "#.####.#####.##.#####.####.#", "#o####.#####.##.#####.####o#", "#.####.#####.##.#####.####.#", "#..........................#", "#.####.##.########.##.####.#", "#.####.##.########.##.####.#", "#......##....##....##......#", "######.##### ## #####.######", "-----#.##### ## #####.#-----", "-----#.##          ##.#-----", "-----#.## ###==### ##.#-----", "######.## #======# ##.######", "      .   #======#   .      ", "######.## #======# ##.######", "-----#.## ###==### ##.#-----", "-----#.##          ##.#-----", "-----#.## ######## ##.#-----", "######.## ######## ##.######", "#............##............#", "#.####.#####.##.#####.####.#", "#.####.#####.##.#####.####.#", "#o..##................##..o#", "###.##.##.########.##.##.###", "#......##....##....##......#", "#.##########.##.##########.#", "#.##########.##.##########.#", "#..........................#", "############################"];
  const ROWS = MAZE.length;
  const COLS = MAZE[0].length;

  const DIRS = {
    left:  {x:-1,y: 0},
    right: {x: 1,y: 0},
    up:    {x: 0,y:-1},
    down:  {x: 0,y: 1},
  };

  const grid = MAZE.map(r => r.split(""));
  let pelletCount = 0;

  function resetPellets() {
    pelletCount = 0;
    for (let y=0;y<ROWS;y++) {
      for (let x=0;x<COLS;x++) {
        const c = MAZE[y][x];
        grid[y][x] = c;
        if (c === "." || c === "o") pelletCount++;
      }
    }
  }

  function isWall(tx, ty) {
    if (tx<0||tx>=COLS||ty<0||ty>=ROWS) return true;
    return grid[ty][tx] === "#";
  }
  function isGate(tx, ty) {
    return grid[ty]?.[tx] === "=";
  }

  function tileCenterX(t) { return (t + 0.5) * CELL; }
  function tileCenterY(t) { return (t + 0.5) * CELL; }
  function pxToTileX(px) { return Math.floor(px / CELL); }
  function pxToTileY(py) { return Math.floor(py / CELL); }

    makeGhost(0, 13, 14, ghostColors[0]),
    makeGhost(1, 13, 15, ghostColors[1]),
    makeGhost(2, 12, 15, ghostColors[2]),
    makeGhost(3, 14, 15, ghostColors[3]),
  ];

  function resetPositions() {
    pac.px = tileCenterX(13);
    pac.py = tileCenterY(23);
    pac.dir = DIRS.left;
    pac.nextDir = DIRS.left;
    pac.powered = 0;

    ghosts = [
      makeGhost(0, 13, 14, ghostColors[0]),
      makeGhost(1, 13, 15, ghostColors[1]),
      makeGhost(2, 12, 15, ghostColors[2]),
      makeGhost(3, 14, 15, ghostColors[3]),
    ];
  }

  function resetGame() {
    score = 0; lives = 3; level = 1;
    scoreEl.textContent = score;
    livesEl.textContent = lives;
    levelEl.textContent = level;
    resetPellets();
    assignPowerSprites();
    resetPositions();
  }

  canvas.tabIndex = 0;
  canvas.addEventListener("pointerdown", () => { try{canvas.focus();}catch(_){} });
  window.addEventListener("pointerdown", () => { try{canvas.focus();}catch(_){} });

  const keyDir = {
    "ArrowLeft": DIRS.left, "a": DIRS.left, "A": DIRS.left,
    "ArrowRight": DIRS.right, "d": DIRS.right, "D": DIRS.right,
    "ArrowUp": DIRS.up, "w": DIRS.up, "W": DIRS.up,
    "ArrowDown": DIRS.down, "s": DIRS.down, "S": DIRS.down,
  };

  function setPacNext(d) {
    pac.nextDir = d;
    if (state === "menu") {
      hideOverlay();
      state = "playing";
    }
  }

  document.addEventListener("keydown", (e) => {
    if (e.key === "p" || e.key === "P") {
      if (state==="playing") { state="paused"; showOverlay("Pausa", "Presiona P para continuar.", "Continuar"); }
      else if (state==="paused") { hideOverlay(); state="playing"; }
      return;
    }
    if (e.key === "r" || e.key === "R") {
      resetGame(); hideOverlay(); state="playing"; return;
    }
    const d = keyDir[e.key];
    if (d) {
      setPacNext(d);
      e.preventDefault();
    }
  }, {passive:false});

  function showOverlay(title, text, buttonText="Continuar") {
    overlayTitle.textContent = title;
    overlayText.textContent = text;
    btnStart.textContent = buttonText;
    overlay.classList.remove("hidden");
  }
  function hideOverlay() { overlay.classList.add("hidden"); }

  btnStart.addEventListener("click", () => {
    if (state==="menu" || state==="gameover" || state==="win") resetGame();
    hideOverlay();
    state = "playing";
  });

  function startMenu() {
    showOverlay("reconoSER", "Pac‑Man web. Come bolitas, evita fantasmas y usa poderes reconoSER.", "Jugar");
  }

  function nearCenter(entity) {
    const tx = pxToTileX(entity.px);
    const ty = pxToTileY(entity.py);
    const cx = tileCenterX(tx);
    const cy = tileCenterY(ty);
    return Math.abs(entity.px - cx) < 1.2 && Math.abs(entity.py - cy) < 1.2;
  }

  function canEnter(tx, ty, entity) {
    if (isWall(tx,ty)) return false;
    // Allow ghosts to pass the gate to leave the house (classic Pac-Man behavior)
    // Prevent ONLY Pac-Man from entering the gate tiles.
    if (!entity.isGhost && isGate(tx,ty)) return false;
    return true;
  }

  function tryTurn(entity) {
    if (!nearCenter(entity)) return;
    const tx = pxToTileX(entity.px);
    const ty = pxToTileY(entity.py);
    const ntx = tx + entity.nextDir.x;
    const nty = ty + entity.nextDir.y;
    if (canEnter(ntx, nty, entity)) {
      entity.dir = entity.nextDir;
      entity.px = tileCenterX(tx);
      entity.py = tileCenterY(ty);
    }
  }

  function step(entity) {
    tryTurn(entity);
    const tx = pxToTileX(entity.px);
    const ty = pxToTileY(entity.py);
    if (nearCenter(entity)) {
      const ntx = tx + entity.dir.x;
      const nty = ty + entity.dir.y;
      if (!canEnter(ntx, nty, entity)) {
        entity.px = tileCenterX(tx);
        entity.py = tileCenterY(ty);
        return;
      }
    }
    entity.px += entity.dir.x * entity.speed;
    entity.py += entity.dir.y * entity.speed;

    if (entity.px < -CELL) entity.px = COLS*CELL + CELL;
    if (entity.px > COLS*CELL + CELL) entity.px = -CELL;
  }

  function chooseGhostDir(g) {
    if (!nearCenter(g)) return;
    const tx = pxToTileX(g.px);
    const ty = pxToTileY(g.py);
    const dirs = [DIRS.left,DIRS.right,DIRS.up,DIRS.down];
    const back = {x:-g.dir.x, y:-g.dir.y};
    const options = dirs.filter(d => {
      if (d.x===back.x && d.y===back.y) return false;
      return canEnter(tx+d.x, ty+d.y, g);
    });
    if (options.length === 0) {
      const rev = dirs.find(d => d.x===back.x && d.y===back.y);
      if (rev) g.nextDir = rev;
      return;
    }
    if (g.frightened>0) {
      g.nextDir = options[Math.floor(Math.random()*options.length)];
      return;
    }
    const ptx = pxToTileX(pac.px);
    const pty = pxToTileY(pac.py);
    let best = options[0], bestD = Infinity;
    for (const d of options) {
      const dx = (ptx - (tx + d.x));
      const dy = (pty - (ty + d.y));
      const dd = dx*dx + dy*dy;
      if (dd < bestD) { bestD = dd; best = d; }
    }
    g.nextDir = best;
  }

  function distPx(a,b) {
    const dx = a.px-b.px, dy=a.py-b.py;
    return Math.hypot(dx,dy);
  }

  function eatAtPac() {
    const tx = pxToTileX(pac.px);
    const ty = pxToTileY(pac.py);
    const c = grid[ty]?.[tx];
    if (c === ".") {
      grid[ty][tx] = "-";
      pelletCount--;
      score += 10;
      scoreEl.textContent = score;
    } else if (c === "o") {
      grid[ty][tx] = "-";
      pelletCount--;
      score += 50;
      scoreEl.textContent = score;
      pac.powered = 60*7;
      for (const g of ghosts) g.frightened = 60*7;
    }
  }

  function drawTextShadowed(text, x, y, size=22, color="#fff", alpha=1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = `900 ${size}px system-ui,Segoe UI,Roboto,Arial`;
    ctx.textAlign = "center";
    ctx.fillStyle = "rgba(0,0,0,.55)";
    ctx.fillText(text, x+2, y+2);
    ctx.fillStyle = color;
    ctx.fillText(text, x, y);
    ctx.restore();
  }

  function drawMaze() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.globalAlpha = 0.10;
    drawTextShadowed("reconoSER", canvas.width/2, canvas.height/2, 72, PRIMARY, 0.10);
    ctx.globalAlpha = 1;

    ctx.fillStyle = PRIMARY;
    for (let y=0;y<ROWS;y++) {
      for (let x=0;x<COLS;x++) {
        if (grid[y][x] === "#") {
          ctx.fillRect(x*CELL, y*CELL, CELL, CELL);
        }
      }
    }

    for (let y=0;y<ROWS;y++) {
      for (let x=0;x<COLS;x++) {
        if (grid[y][x] === ".") {
          const cx = x*CELL + CELL/2;
          const cy = y*CELL + CELL/2;
          ctx.fillStyle = "#f5f5f7";
          ctx.beginPath();
          ctx.arc(cx, cy, 2.2, 0, Math.PI*2);
          ctx.fill();
        }
      }
    }

    for (const pp of powerPositions) {
      if (grid[pp.y][pp.x] !== "o") continue;
      const im = powerImgs[pp.idx];
      const cx = pp.x*CELL + CELL/2;
      const cy = pp.y*CELL + CELL/2;
      const box = CELL*1.35;
      if (im && im.complete && im.naturalWidth) {
        const scale = Math.min(box/im.naturalWidth, box/im.naturalHeight);
        const w = im.naturalWidth*scale;
        const h = im.naturalHeight*scale;
        ctx.drawImage(im, cx-w/2, cy-h/2, w, h);
      } else {
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(cx, cy, 6.5, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  function drawPac() {
    pac.mouthT += 0.20;
    const r = CELL*0.46;
    const mouth = (Math.sin(pac.mouthT)*0.35 + 0.35);
    let ang = 0;
    if (pac.dir === DIRS.right) ang = 0;
    if (pac.dir === DIRS.left) ang = Math.PI;
    if (pac.dir === DIRS.up) ang = -Math.PI/2;
    if (pac.dir === DIRS.down) ang = Math.PI/2;

    ctx.save();
    ctx.translate(pac.px, pac.py);
    ctx.rotate(ang);

    ctx.fillStyle = "#ffd60a";
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.arc(0,0,r, mouth, Math.PI*2 - mouth);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#111";
    ctx.beginPath();
    ctx.arc(r*0.10, -r*0.45, r*0.10, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
  }

  function drawGhost(g) {
    const r = CELL*0.46;
    ctx.save();
    ctx.translate(g.px, g.py);

    let body = g.color;
    if (g.frightened>0) body = "#2a5bd7";
    ctx.fillStyle = body;

    ctx.beginPath();
    ctx.arc(0, -r*0.1, r, Math.PI, 0);
    ctx.lineTo(r, r*0.8);
    for (let i=0;i<4;i++) {
      const x0 = r - (i+1)*r*0.5;
      ctx.quadraticCurveTo(x0 + r*0.25, r*1.05, x0, r*0.8);
    }
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.ellipse(-r*0.3, -r*0.15, r*0.22, r*0.28, 0, 0, Math.PI*2);
    ctx.ellipse(r*0.3, -r*0.15, r*0.22, r*0.28, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = (g.frightened>0) ? "#ffb300" : "#1b1b1b";
    const px = g.dir.x*0.12;
    const py = g.dir.y*0.12;
    ctx.beginPath();
    ctx.ellipse(-r*0.3 + px*CELL*0.2, -r*0.12 + py*CELL*0.2, r*0.10, r*0.12, 0, 0, Math.PI*2);
    ctx.ellipse(r*0.3 + px*CELL*0.2, -r*0.12 + py*CELL*0.2, r*0.10, r*0.12, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
  }

  function update() {
    if (state!=="playing") return;

    if (pac.powered>0) pac.powered--;
    for (const g of ghosts) if (g.frightened>0) g.frightened--;

    step(pac);
    eatAtPac();

    for (const g of ghosts) {
      chooseGhostDir(g);
      step(g);
    }

    for (const g of ghosts) {
      if (distPx(pac,g) < CELL*0.55) {
        if (g.frightened>0) {
          score += 200;
          scoreEl.textContent = score;
          g.px = tileCenterX(g.home.tx);
          g.py = tileCenterY(g.home.ty);
          g.frightened = 0;
        } else {
          lives--;
          livesEl.textContent = lives;
          if (lives <= 0) {
            state="gameover";
            showOverlay("Fin del juego — reconoSER", `Puntaje final: ${score}`, "Jugar de nuevo");
          } else {
            resetPositions();
          }
          return;
        }
      }
    }

    if (pelletCount <= 0) {
      state="win";
      showOverlay("¡Nivel completado! — reconoSER", `Puntaje final: ${score}`, "Jugar de nuevo");
    }
  }

  function render() {
    drawMaze();
    drawPac();
    for (const g of ghosts) drawGhost(g);

    if (pac.powered>0) {
      ctx.save();
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = PRIMARY;
      ctx.fillRect(0, canvas.height-8, (canvas.width*(pac.powered/(60*7))), 8);
      ctx.restore();
    }
  }

  function loop() {
    requestAnimationFrame(loop);
    update();
    render();
  }

  resetPellets();
  assignPowerSprites();
  startMenu();
  loop();

  // ===== Background Music (GUARANTEED START) =====
  const bgm = document.getElementById("bgm");
  function playMusic(){
    if (!bgm) return;
    bgm.volume = 0.35;
    bgm.muted = false;
    bgm.play().catch(()=>{});
  }

})();
</script>
