<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>reconoSER · Rompecabezas</title>
<style>
  :root{
    --primary:#c10230; --bg:#0f0f14; --panel:rgba(255,255,255,.06);
    --stroke:rgba(255,255,255,.12); --text:#f6f6f7; --muted:rgba(246,246,247,.72);
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; color:var(--text);
    background:
      radial-gradient(1100px 650px at 30% 15%, rgba(193,2,48,.22), transparent 55%),
      radial-gradient(900px 500px at 80% 65%, rgba(255,214,10,.10), transparent 60%),
      var(--bg);
    min-height:100vh; display:grid; place-items:center; padding:16px;
  }
  .app{width:min(1200px,100%); display:grid; grid-template-columns:1fr 360px; gap:16px; align-items:start;}
  @media (max-width:980px){.app{grid-template-columns:1fr}}
  .topbar{
    grid-column:1/-1; display:flex; justify-content:space-between; align-items:center; gap:12px;
    padding:12px 14px; border-radius:16px;
    background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
    border:1px solid var(--stroke);
  }
  .brand{user-select:none}
  .brand .name{font-weight:1000; letter-spacing:.5px; font-size:22px}
  .brand .name span{color:var(--primary)}
  .brand .sub{color:var(--muted); font-size:13px}
  .actions{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
  button, select{
    border:1px solid rgba(255,255,255,.14);
    background:rgba(255,255,255,.06);
    color:var(--text);
    padding:10px 12px;
    border-radius:12px;
    font-weight:900;
  }
  button{cursor:pointer}
  button:hover{background:rgba(255,255,255,.10)}
  button.primary{border-color:rgba(193,2,48,.55); background:rgba(193,2,48,.18)}
  button.primary:hover{background:rgba(193,2,48,.26)}
  .chip{padding:8px 10px; border-radius:999px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.06); font-weight:1000; font-size:12px;}
  .panel{background:var(--panel); border:1px solid var(--stroke); border-radius:18px; padding:14px;}
  .boardWrap{position:relative; overflow:hidden}
  .watermark{
    position:absolute; inset:0; display:grid; place-items:center; pointer-events:none;
    opacity:.10; font-weight:1000; font-size:clamp(52px, 7vw, 110px); letter-spacing:1px;
  }
  .watermark span{color:rgba(193,2,48,.55)}
  .board{
    position:relative; width:min(760px, 100%); aspect-ratio:1/1; margin:0 auto; border-radius:18px;
    background:rgba(0,0,0,.26); border:1px solid rgba(255,255,255,.10);
  }
  .tile{
    position:absolute; border-radius:12px; border:1px solid rgba(255,255,255,.12);
    box-shadow:0 8px 22px rgba(0,0,0,.35);
    touch-action:none; cursor:grab; overflow:hidden;
    background-repeat:no-repeat; user-select:none;
  }
  .tile:active{cursor:grabbing}
  .tile.correct{outline:3px solid rgba(43,213,118,.65); background-color:rgba(43,213,118,.08);}
  .hint{color:var(--muted); font-size:13px; line-height:1.35; margin-bottom:12px}
  .stats{display:flex; gap:10px; flex-wrap:wrap; margin:10px 0 12px}
  .preview{margin-top:12px; border-radius:14px; border:1px solid rgba(255,255,255,.10); overflow:hidden; background:rgba(0,0,0,.25)}
  .preview img{width:100%; display:block}
  .overlay{position:fixed; inset:0; display:none; place-items:center; background:rgba(0,0,0,.62); z-index:50; padding:18px}
  .overlay.show{display:grid}
  .card{
    width:min(560px,100%); border-radius:20px; border:1px solid rgba(255,255,255,.14);
    background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
    box-shadow:0 18px 60px rgba(0,0,0,.45); padding:18px; text-align:center
  }
  .bigbrand{font-weight:1000; letter-spacing:.6px; font-size:36px; margin:6px 0 10px}
  .bigbrand span{color:var(--primary)}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="name">recono<span>SER</span></div>
      <div class="sub">Rompecabezas digital</div>
    </div>
    <div class="actions">
      <label class="chip" style="display:flex;gap:8px;align-items:center;">
        Dificultad
        <select id="difficulty">
          <option value="3">3×3 (fácil)</option>
          <option value="4" selected>4×4 (medio)</option>
          <option value="5">5×5 (difícil)</option>
        </select>
      </label>
      <button id="shuffleBtn" class="primary">Mezclar</button>
      <button id="guideBtn">Mostrar guía</button>
    </div>
  </div>

  <div class="panel boardWrap">
    <div class="watermark">recono<span>SER</span></div>
    <div id="board" class="board"></div>
  </div>

  <div class="panel">
    <h3 style="margin:0 0 10px 0;font-size:16px">Cómo jugar</h3>
    <div class="hint">Arrastra y suelta las piezas. Si cae en su lugar correcto, se marca en verde.</div>
    <div class="stats">
      <div class="chip">Correctas: <span id="correctCount">0</span>/<span id="totalCount">0</span></div>
      <div class="chip">Movimientos: <span id="moves">0</span></div>
    </div>
    <div class="preview" id="previewBox" style="display:none">
      <img id="guideImg" alt="Guía">
    </div>
    <div class="hint" style="margin-top:10px">Esta versión es <b>1 archivo</b> (imagen incrustada).</div>
  </div>
</div>

<div id="overlay" class="overlay">
  <div class="card">
    <div class="bigbrand">recono<span>SER</span></div>
    <h2 style="margin:0 0 10px;">¡Completado! ✅</h2>
    <p style="margin:0 0 14px;color:rgba(246,246,247,.86)">Movimientos: <b><span id="finalMoves">0</span></b></p>
    <button id="againBtn" class="primary" style="width:100%;padding:12px 14px;border-radius:14px;">Jugar de nuevo</button>
  </div>
</div>

  const board = document.getElementById("board");
  const difficultySel = document.getElementById("difficulty");
  const shuffleBtn = document.getElementById("shuffleBtn");
  const guideBtn = document.getElementById("guideBtn");
  const previewBox = document.getElementById("previewBox");
  const guideImg = document.getElementById("guideImg");
  const correctEl = document.getElementById("correctCount");
  const totalEl = document.getElementById("totalCount");
  const movesEl = document.getElementById("moves");
  const overlay = document.getElementById("overlay");
  const finalMovesEl = document.getElementById("finalMoves");
  const againBtn = document.getElementById("againBtn");

  guideImg.src = IMG_SRC;

  let img = new Image();
  img.src = IMG_SRC;

  let N = Number(difficultySel.value);
  let tileSize = 0;
  let tiles = [];
  let moves = 0;

  const clamp = (v,min,max)=>Math.max(min,Math.min(max,v));

  function boardSize() {
    const rect = board.getBoundingClientRect();
    const size = Math.floor(Math.min(rect.width, rect.height));
    return size || 600;
  }

  function buildSolved() {
    board.innerHTML = "";
    tiles = [];
    moves = 0;
    movesEl.textContent = "0";
    overlay.classList.remove("show");

    const size = boardSize();
    tileSize = size / N;
    totalEl.textContent = String(N*N);

    let id=0;
    for(let r=0;r<N;r++) for(let c=0;c<N;c++) {
      const el = document.createElement("div");
      el.className="tile";
      el.style.width = tileSize+"px";
      el.style.height = tileSize+"px";
      el.style.backgroundImage = `url('${IMG_SRC}')`;
      el.style.backgroundSize = `${size}px ${size}px`;
      el.style.backgroundPosition = `${-c*tileSize}px ${-r*tileSize}px`;
      el.style.transform = `translate(${c*tileSize}px, ${r*tileSize}px)`;
      el.style.zIndex = String(10+id);

      const t={id,row:r,col:c,x:c*tileSize,y:r*tileSize, el};
      attachDrag(t);
      board.appendChild(el);
      tiles.push(t);
      id++;
    }
    updateCorrect();
  }

  function shuffle() {
    const size = boardSize();
    tileSize = size / N;
    const positions=[];
    for(let r=0;r<N;r++) for(let c=0;c<N;c++) positions.push([c*tileSize,r*tileSize]);
    for(let i=positions.length-1;i>0;i--) {
      const j=Math.floor(Math.random()*(i+1));
      [positions[i],positions[j]]=[positions[j],positions[i]];
    }
    tiles.forEach((t,i)=>{
      t.x=positions[i][0]; t.y=positions[i][1];
      t.el.style.transform = `translate(${t.x}px, ${t.y}px)`;
      t.el.classList.remove("correct");
    });
    moves=0; movesEl.textContent="0";
    updateCorrect();
  }

  function nearestCell(x,y) {
    const c = clamp(Math.round(x/tileSize),0,N-1);
    const r = clamp(Math.round(y/tileSize),0,N-1);
    return [c*tileSize,r*tileSize,r,c];
  }

  function updateCorrect() {
    let correct=0;
    tiles.forEach(t=>{
      const isOk = Math.abs(t.x - t.col*tileSize) < 0.01 && Math.abs(t.y - t.row*tileSize) < 0.01;
      if(isOk) { t.el.classList.add("correct"); correct++; }
      else t.el.classList.remove("correct");
    });
    correctEl.textContent = String(correct);
    if(correct===N*N) {
      finalMovesEl.textContent = String(moves);
      overlay.classList.add("show");
    }
  }

  function snapSwap(active) {
    const size = boardSize();
    const max = size - tileSize;
    const [sx,sy] = nearestCell(active.x, active.y);
    const tx = clamp(sx,0,max), ty=clamp(sy,0,max);

    const other = tiles.find(t=>t!==active && Math.abs(t.x-tx)<0.01 && Math.abs(t.y-ty)<0.01);
    if(other) {
      other.x=active.x; other.y=active.y;
      other.el.style.transform = `translate(${other.x}px, ${other.y}px)`;
    }
    active.x=tx; active.y=ty;
    active.el.style.transform = `translate(${active.x}px, ${active.y}px)`;
    updateCorrect();
  }

  function attachDrag(t) {
    let dragging=false;
    let sx=0, sy=0, ox=0, oy=0;

    const down = (clientX, clientY) => {
      dragging=true;
      t.el.style.zIndex="999";
      sx=clientX; sy=clientY; ox=t.x; oy=t.y;
    };
    const move = (clientX, clientY) => {
      if(!dragging) return;
      const size = boardSize();
      const max = size - tileSize;
      t.x = clamp(ox + (clientX - sx), 0, max);
      t.y = clamp(oy + (clientY - sy), 0, max);
      t.el.style.transform = `translate(${t.x}px, ${t.y}px)`;
    };
    const up = () => {
      if(!dragging) return;
      dragging=false;
      t.el.style.zIndex=String(10+t.id);
      moves++; movesEl.textContent=String(moves);
      snapSwap(t);
    };

    t.el.addEventListener("pointerdown", (e)=>{ e.preventDefault(); down(e.clientX,e.clientY); });
    window.addEventListener("pointermove", (e)=>move(e.clientX,e.clientY));
    window.addEventListener("pointerup", up);

    // Touch fallback
    t.el.addEventListener("touchstart", (e)=>{
      const touch=e.touches[0]; if(!touch) return;
      e.preventDefault(); down(touch.clientX, touch.clientY);
    }, {passive:false});
    window.addEventListener("touchmove", (e)=>{
      const touch=e.touches[0]; if(!touch) return;
      move(touch.clientX, touch.clientY);
    }, {passive:false});
    window.addEventListener("touchend", up);
  }

  function layout() {
    const size = boardSize();
    tileSize = size / N;
    tiles.forEach(t=>{
      t.el.style.width=tileSize+"px";
      t.el.style.height=tileSize+"px";
      t.el.style.backgroundSize = `${size}px ${size}px`;
      t.el.style.backgroundPosition = `${-t.col*tileSize}px ${-t.row*tileSize}px`;
      const [sx,sy]=nearestCell(t.x,t.y);
      t.x=sx; t.y=sy;
      t.el.style.transform=`translate(${t.x}px, ${t.y}px)`;
    });
    updateCorrect();
  }

  function start() {
    requestAnimationFrame(()=>{
      buildSolved();
      shuffle();
      layout();
    });
  }

  img.onload = start;

  difficultySel.addEventListener("change", ()=>{ N=Number(difficultySel.value); start(); });
  shuffleBtn.addEventListener("click", shuffle);
  guideBtn.addEventListener("click", ()=>{
    const showing = previewBox.style.display !== "none";
    previewBox.style.display = showing ? "none" : "block";
    guideBtn.textContent = showing ? "Mostrar guía" : "Ocultar guía";
  });
  againBtn.addEventListener("click", ()=>{ overlay.classList.remove("show"); shuffle(); });
  window.addEventListener("resize", layout);
})();
</script>
